<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <style>
    /* خلفية زرقاء بحرية */
    .bg {
      fill: #00334e;
    }

    /* أنيميشن حركة الأمواج */
    @keyframes waveMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .wave {
      animation: waveMove 12s linear infinite;
      fill: #004466;
      opacity: 0.6;
    }

    .wave-mid {
      animation: waveMove 8s linear infinite;
      fill: #005577;
      opacity: 0.4;
    }

    .wave-front {
      animation: waveMove 5s linear infinite;
      fill: #006688;
      opacity: 0.3;
    }

    /* أنيميشن الاسم */
    .name-text-base {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      font-weight: 800;
      font-size: 70px;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 2px;
    }

    .drawing-layer {
      fill: transparent;
      stroke: #FFFFFF; /* لون أبيض ثلجي للكتابة */
      stroke-width: 2;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      /* تم تغييرها إلى infinite لتتكرر إلى ما لا نهاية، بمدة إجمالية 10 ثوانٍ للدورة الواحدة */
      animation: drawName 10s ease-in-out infinite;
    }

    @keyframes drawName {
      0% {
        stroke-dashoffset: 1200;
        fill: transparent;
        stroke-width: 2;
      }
      /* من 0% إلى 45% يتم رسم الحروف ببطء */
      45% {
        stroke-dashoffset: 0;
        fill: transparent;
        stroke-width: 2;
      }
      /* من 55% إلى 85% يمتلئ باللون الأبيض ويظل ثابتاً ومقروءاً للمشاهد */
      55%, 85% {
        stroke-dashoffset: 0;
        fill: #FFFFFF;
        stroke-width: 0;
        opacity: 1;
      }
      /* من 85% إلى 95% يختفي ببطء تمهيداً لإعادة الرسم من جديد */
      95%, 100% {
        stroke-dashoffset: 1200;
        fill: transparent;
        stroke-width: 0;
        opacity: 0;
      }
    }
  </style>

  <!-- الخلفية الثابتة -->
  <rect class="bg" width="100%" height="100%"/>

  <!-- مجموعات الأمواج المتحركة في الخلفية -->
  <g>
    <!-- الموجة الخلفية البطيئة -->
    <path class="wave" d="M 0,160 Q 200,130 400,160 T 800,160 T 1200,160 T 1600,160 L 1600,250 L 0,250 Z" />
    <!-- الموجة المتوسطة -->
    <path class="wave-mid" d="M 0,180 Q 200,210 400,180 T 800,180 T 1200,180 T 1600,180 L 1600,250 L 0,250 Z" />
    <!-- الموجة الأمامية السريعة -->
    <path class="wave-front" d="M 0,200 Q 200,170 400,200 T 800,200 T 1200,200 T 1600,200 L 1600,250 L 0,250 Z" />
  </g>

  <!-- طبقة النص في المنتصف فوق الأمواج -->
  <g transform="translate(400, 110)">
    <!-- نص الرسم المتحرك اللانهائي -->
    <text class="name-text-base drawing-layer">Hello My Friend !</text>
  </g>
</svg>
