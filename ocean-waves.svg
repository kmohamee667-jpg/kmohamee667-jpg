<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <style>
    /* خلفية برمجية داكنة */
    .bg {
      fill: #0a0f1d;
    }

    /* تأثير نبض شبكة الكود الخلفية */
    @keyframes gridPulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.3; }
    }

    .code-grid {
      stroke: #39FF14;
      stroke-width: 0.5;
      animation: gridPulse 4s ease-in-out infinite;
    }

    /* نص برمجي خلفي متحرك */
    .bg-code-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      fill: #39FF14;
      opacity: 0.1;
    }

    /* أنيميشن النص الأساسي */
    .name-text-base {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      font-weight: 800;
      font-size: 52px;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 4px;
    }

    .drawing-layer {
      fill: transparent;
      stroke: #FFFFFF;
      stroke-width: 2;
      stroke-dasharray: 1500;
      stroke-dashoffset: 1500;
      animation: drawName 9s ease-in-out infinite;
    }

    @keyframes drawName {
      0% {
        stroke-dashoffset: 1500;
        fill: transparent;
        stroke-width: 2;
      }
      45% {
        stroke-dashoffset: 0;
        fill: transparent;
        stroke-width: 2;
      }
      55%, 85% {
        stroke-dashoffset: 0;
        fill: #FFFFFF;
        stroke-width: 0;
        opacity: 1;
      }
      95%, 100% {
        stroke-dashoffset: 1500;
        fill: transparent;
        stroke-width: 0;
        opacity: 0;
      }
    }
  </style>

  <!-- الخلفية الأساسية -->
  <rect class="bg" width="100%" height="100%"/>

  <!-- مصفوفة خطوط الديجيتال والبرمجة -->
  <g class="code-grid">
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="150" y1="0" x2="150" y2="250" />
    <line x1="300" y1="0" x2="300" y2="250" />
    <line x1="500" y1="0" x2="500" y2="250" />
    <line x1="650" y1="0" x2="650" y2="250" />
  </g>

  <!-- رموز الكود البرمجية المتناثرة في الخلفية -->
  <text x="20" y="30" class="bg-code-text">&lt;div class="dev"&gt;</text>
  <text x="700" y="40" class="bg-code-text">01011010</text>
  <text x="40" y="230" class="bg-code-text">kmohamee667:~$ ./exploit</text>
  <text x="680" y="220" class="bg-code-text">&lt;/div&gt;</text>

  <!-- طبقة النص الرسمي الممركز في المنتصف -->
  <g transform="translate(400, 125)">
    <text class="name-text-base drawing-layer">WELCOME TO MY REPOSITORY</text>
  </g>
</svg>
