<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <style>
    /* خلفية زرقاء بحرية */
    .bg {
      fill: #00334e;
    }

    /* أنيميشن حركة الأمواج */
    @keyframes waveMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .wave {
      animation: waveMove 12s linear infinite;
      fill: #004466;
      opacity: 0.6;
    }

    .wave-mid {
      animation: waveMove 8s linear infinite;
      fill: #005577;
      opacity: 0.4;
    }

    .wave-front {
      animation: waveMove 5s linear infinite;
      fill: #006688;
      opacity: 0.3;
    }

    /* أنيميشن الاسم */
    .name-text-base {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      font-weight: 800;
      font-size: 70px;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 2px;
    }

    .drawing-layer {
      fill: transparent;
      stroke: #FFFFFF; /* لون أبيض ثلجي للكتابة */
      stroke-width: 2;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawName 7s ease-in-out forwards;
    }

    @keyframes drawName {
      0% {
        stroke-dashoffset: 1200;
        fill: transparent;
      }
      70% {
        stroke-dashoffset: 0;
        fill: transparent;
      }
      100% {
        stroke-dashoffset: 0;
        fill: #FFFFFF; /* يمتلئ باللون الأبيض */
        stroke-width: 0;
      }
    }

    /* تأثير نبض خفيف للاسم بعد الكتابة */
    .pulse-layer {
      fill: #FFFFFF;
      opacity: 0;
      animation: finalGlow 4s ease-in-out infinite alternate;
      animation-delay: 7s;
    }

    @keyframes finalGlow {
      0% { opacity: 0.8; filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.4)); }
      100% { opacity: 1; filter: drop-shadow(0px 0px 15px rgba(255,255,255,0.9)); }
    }
  </style>

  <rect class="bg" width="100%" height="100%"/>

  <g>
    <path class="wave" d="M 0,160 Q 200,130 400,160 T 800,160 T 1200,160 T 1600,160 L 1600,250 L 0,250 Z" />
    <path class="wave-mid" d="M 0,180 Q 200,210 400,180 T 800,180 T 1200,180 T 1600,180 L 1600,250 L 0,250 Z" />
    <path class="wave-front" d="M 0,200 Q 200,170 400,200 T 800,200 T 1200,200 T 1600,200 L 1600,250 L 0,250 Z" />
  </g>

  <g transform="translate(400, 110)">
    <text class="name-text-base pulse-layer">KHALID MOHAMED</text>
    <text class="name-text-base drawing-layer">KHALID MOHAMED</text>
  </g>
</svg>
